[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9 --activate",
  "pnpm install --frozen-lockfile=false --ignore-scripts --config.minimumReleaseAge=0"
]

[phases.build]
cmds = ["pnpm --filter @workspace/mapagi run build:railway"]

[start]
cmd = "node server.js"
