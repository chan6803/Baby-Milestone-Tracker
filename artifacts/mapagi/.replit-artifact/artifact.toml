kind = "web"
previewPath = "/"
title = "엄마, 아빠, 그리고 아기"
version = "1.0.0"
id = "artifacts/mapagi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25141
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mapagi run dev"

[services.env]
PORT = "25141"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mapagi", "run", "build"]
publicDir = "artifacts/mapagi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
